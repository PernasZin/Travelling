
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRAVELING — Explore o Mundo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Montserrat:wght@200;300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  --bg: #0a0a0a;
  --surface: rgba(14,14,14,0.96);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.07);
  --gold: #c8a850;
  --gold-soft: rgba(200,168,80,0.15);
  --gold-dim: #7a6030;
  --cream: #ede6d6;
  --muted: rgba(237,230,214,0.32);
  --dim: rgba(237,230,214,0.58);
  --bright: rgba(237,230,214,0.92);
  --danger: #e05252;
  --ok: #52b788;
  --warn: #e09452;
  /* Continent palette */
  --eu: #c8a850; --eu-bg: rgba(200,168,80,0.08); --eu-bd: rgba(200,168,80,0.25);
  --na: #3a8fa0; --na-bg: rgba(58,143,160,0.08); --na-bd: rgba(58,143,160,0.25);
  --sa: #3aad72; --sa-bg: rgba(58,173,114,0.08); --sa-bd: rgba(58,173,114,0.25);
  --af: #d4804a; --af-bg: rgba(212,128,74,0.08); --af-bd: rgba(212,128,74,0.25);
  --as: #c05050; --as-bg: rgba(192,80,80,0.08); --as-bd: rgba(192,80,80,0.25);
  --oc: #5a74c8; --oc-bg: rgba(90,116,200,0.08); --oc-bd: rgba(90,116,200,0.25);
  /* Map */
  --land: #161616;
  --border: #252525;
  /* Motion */
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-out: cubic-bezier(0,0,.2,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--cream); }
body { font-family:'Montserrat',sans-serif; font-weight:300; }
button { font-family:inherit; cursor:pointer; }
input { font-family:inherit; }

/* ═══════════════════════════════════════════════════
   LOADING SCREEN
═══════════════════════════════════════════════════ */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity .8s var(--ease);
}
#loading.hide { opacity:0; pointer-events:none; }
.ld-title {
  font-family:'Playfair Display',serif; font-size:2rem;
  letter-spacing:.6em; color:var(--cream); margin-bottom:6px; font-weight:400;
  animation: fadeUp .6s var(--ease) both;
}
.ld-sub {
  font-size:.42rem; letter-spacing:.5em; color:var(--muted);
  text-transform:uppercase; margin-bottom:32px;
  animation: fadeUp .6s var(--ease) .15s both;
}
.ld-bar-wrap { width:200px; height:1px; background:rgba(200,168,80,.1); overflow:hidden; animation: fadeUp .6s var(--ease) .3s both; }
.ld-bar-fill { height:100%; background:linear-gradient(to right,transparent,var(--gold),transparent); animation:ldSlide 1.2s ease infinite; }
@keyframes ldSlide { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
#hdr {
  position:fixed; top:0; left:0; right:0; height:56px;
  display:flex; align-items:center; justify-content:center;
  z-index:200; pointer-events:none;
  background:linear-gradient(to bottom, rgba(10,10,10,.8), transparent);
}
#logo {
  font-family:'Playfair Display',serif;
  font-size:clamp(.9rem,1.5vw,1.3rem);
  letter-spacing:.6em; color:var(--cream); font-weight:400;
  opacity:0; animation:fadeUp .7s var(--ease) .5s forwards;
}
#logo em { color:var(--gold); font-style:normal; }

/* ═══════════════════════════════════════════════════
   BREADCRUMB
═══════════════════════════════════════════════════ */
#breadcrumb {
  position:fixed; top:62px; left:50%; transform:translateX(-50%);
  z-index:200; display:flex; align-items:center; gap:6px;
  font-size:.48rem; letter-spacing:.2em; color:var(--muted);
  text-transform:uppercase; white-space:nowrap;
  opacity:0; transition:opacity .4s var(--ease);
  pointer-events:none;
}
#breadcrumb.vis { opacity:1; }
.bc-sep { color:var(--gold-dim); font-size:.5rem; }
.bc-item { color:var(--muted); transition:color .2s; }
.bc-item.active { color:var(--gold); }

/* ═══════════════════════════════════════════════════
   TOP CONTROLS (search + reset)
═══════════════════════════════════════════════════ */
#top-right {
  position:fixed; top:14px; right:22px; z-index:300;
  display:flex; align-items:center; gap:14px;
  opacity:0; animation:fadeUp .6s var(--ease) 1.2s forwards;
}
#reset-btn {
  background:none; border:1px solid rgba(200,168,80,.18);
  color:var(--muted); font-size:.46rem; letter-spacing:.25em;
  text-transform:uppercase; padding:7px 16px;
  transition:all .25s var(--ease); display:none; align-items:center; gap:6px;
}
#reset-btn.vis { display:flex; }
#reset-btn:hover { border-color:var(--gold); color:var(--gold); }

/* Search wrapper */
#search-wrap { position:relative; }
#search-input {
  background:transparent; border:none;
  border-bottom:1px solid rgba(200,168,80,.18);
  outline:none; color:var(--cream);
  font-size:.55rem; font-weight:300; letter-spacing:.18em;
  padding:6px 2px 6px 20px; width:90px;
  transition:width .4s var(--ease), border-color .3s;
  text-transform:uppercase; caret-color:var(--gold);
}
#search-input::placeholder { color:var(--muted); }
#search-input:focus { width:170px; border-bottom-color:rgba(200,168,80,.55); }
#search-icon {
  position:absolute; left:0; top:50%; transform:translateY(-50%);
  color:var(--muted); font-size:.7rem; pointer-events:none;
}
/* Autocomplete dropdown */
#autocomplete {
  position:absolute; top:calc(100% + 4px); right:0;
  background:rgba(10,10,10,.97);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  min-width:180px; z-index:400;
  display:none; flex-direction:column;
  overflow:hidden;
}
#autocomplete.vis { display:flex; }
.ac-item {
  padding:9px 14px; font-size:.58rem; letter-spacing:.1em;
  color:var(--dim); cursor:pointer; transition:background .15s, color .15s;
  text-transform:uppercase; display:flex; align-items:center; gap:8px;
}
.ac-item:hover { background:rgba(200,168,80,.08); color:var(--gold); }
.ac-flag { font-size:.9rem; }

/* ═══════════════════════════════════════════════════
   MAP
═══════════════════════════════════════════════════ */
#map-wrap {
  position:fixed; inset:0;
  transition:transform .75s var(--ease);
}
#map-wrap.panel-open { transform:translateX(-20%); }
#map-svg { width:100%; height:100%; display:block; }

/* Land base */
.land {
  fill:var(--land); stroke:var(--border); stroke-width:.3px;
  cursor:pointer; transition:fill .18s, stroke .18s, stroke-width .18s, filter .2s;
}
.land.dimmed { fill:#0c0c0c; stroke:#1a1a1a; stroke-width:.15px; opacity:.45; }

/* Continent tints */
.land.c-EU { fill:#1d1908; }
.land.c-NA { fill:#0a1d22; }
.land.c-SA { fill:#0a1d12; }
.land.c-AF { fill:#1e1108; }
.land.c-AS { fill:#1c0d0d; }
.land.c-OC { fill:#0e1222; }

/* Hover glow — continent aware */
.land.c-EU:hover { fill:#2a220a; stroke:var(--eu); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(200,168,80,.3)); }
.land.c-NA:hover { fill:#0e2a38; stroke:var(--na); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(58,143,160,.3)); }
.land.c-SA:hover { fill:#0a2e18; stroke:var(--sa); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(58,173,114,.3)); }
.land.c-AF:hover { fill:#2a1608; stroke:var(--af); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(212,128,74,.3)); }
.land.c-AS:hover { fill:#2a0e0e; stroke:var(--as); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(192,80,80,.3)); }
.land.c-OC:hover { fill:#121838; stroke:var(--oc); stroke-width:.8px; filter:drop-shadow(0 0 4px rgba(90,116,200,.3)); }
.land:not([class*="c-"]):hover { fill:#222; stroke:#555; stroke-width:.5px; }

/* Selected */
.land.selected { stroke:var(--gold)!important; stroke-width:1.2px!important; filter:drop-shadow(0 0 8px rgba(200,168,80,.35))!important; }
.land.c-EU.selected { fill:#302610!important; }
.land.c-NA.selected { fill:#103040!important; }
.land.c-SA.selected { fill:#0e3420!important; }
.land.c-AF.selected { fill:#321c0a!important; }
.land.c-AS.selected { fill:#321010!important; }
.land.c-OC.selected { fill:#141e44!important; }

/* Pulse dots */
.pdot { fill:var(--gold); pointer-events:none; animation:pdot 2.6s ease-in-out infinite; }
@keyframes pdot { 0%,100%{r:2.4;opacity:.7;} 50%{r:4;opacity:.2;} }

/* ═══════════════════════════════════════════════════
   MILES TAB (left strip)
═══════════════════════════════════════════════════ */
#miles-tab {
  position:fixed; left:0; top:50%; transform:translateY(-50%);
  width:30px; height:200px;
  background:rgba(8,8,8,.94);
  border-right:1px solid rgba(200,168,80,.07);
  display:flex; align-items:center; justify-content:center;
  z-index:150; cursor:pointer;
  opacity:0; animation:fadeUp .6s var(--ease) 2s forwards;
  transition:border-color .3s;
}
#miles-tab:hover { border-right-color:rgba(200,168,80,.22); }
#miles-tab-lbl {
  writing-mode:vertical-rl; transform:rotate(180deg);
  font-size:.42rem; letter-spacing:.32em; color:var(--muted);
  text-transform:uppercase; white-space:nowrap;
}
#miles-card {
  position:fixed; left:-280px; top:50%; transform:translateY(-50%);
  width:262px;
  background:rgba(8,8,8,.95);
  backdrop-filter:blur(32px); -webkit-backdrop-filter:blur(32px);
  border:1px solid var(--glass-border); border-left:none;
  padding:24px 20px; z-index:160;
  transition:left .48s var(--ease); pointer-events:none;
}
#miles-card.open { left:30px; pointer-events:all; }
.mc-h { font-family:'Playfair Display',serif; font-size:.9rem; color:var(--gold); margin-bottom:14px; font-style:italic; }
.mc-s { margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid rgba(237,230,214,.05); }
.mc-s:last-child { border:none; margin:0; padding:0; }
.mc-s h4 { font-size:.44rem; letter-spacing:.22em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:5px; font-weight:500; }
.mc-s p { font-size:.66rem; color:var(--dim); line-height:1.75; }

/* ═══════════════════════════════════════════════════
   COUNTRY PANEL (right, 40% width)
═══════════════════════════════════════════════════ */
#panel {
  position:fixed; right:-42vw; top:0; bottom:0; width:40vw; min-width:380px; max-width:600px;
  background:rgba(7,7,7,.97);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  border-left:1px solid var(--glass-border);
  z-index:250; overflow-y:auto; overflow-x:hidden;
  transition:right .7s var(--ease);
  scrollbar-width:thin; scrollbar-color:rgba(200,168,80,.12) transparent;
}
#panel::-webkit-scrollbar { width:2px; }
#panel::-webkit-scrollbar-thumb { background:rgba(200,168,80,.15); border-radius:2px; }
#panel.open { right:0; }

/* Panel close button */
#p-close {
  position:sticky; top:0; left:0; right:0; z-index:10;
  display:flex; align-items:center; gap:10px;
  padding:14px 20px;
  background:rgba(7,7,7,.8); backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,.05);
}
#p-close-btn {
  background:none; border:1px solid rgba(237,230,214,.1);
  color:var(--muted); width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; transition:all .2s; flex-shrink:0;
}
#p-close-btn:hover { border-color:var(--gold); color:var(--gold); }
#p-close-label { font-size:.44rem; letter-spacing:.22em; color:var(--muted); text-transform:uppercase; }

/* Panel inner content */
#panel-body {
  opacity:0; transform:translateX(16px);
  transition:opacity .4s var(--ease) .3s, transform .4s var(--ease) .3s;
}
#panel.open #panel-body { opacity:1; transform:translateX(0); }

/* ── HERO IMAGE ── */
#p-hero {
  width:100%; height:200px; object-fit:cover;
  display:block; position:relative;
  background:#111;
}
#p-hero-img {
  width:100%; height:200px; object-fit:cover;
  display:block; filter:brightness(.75);
}
#p-hero-overlay {
  position:absolute; bottom:0; left:0; right:0;
  padding:16px 24px 14px;
  background:linear-gradient(transparent, rgba(7,7,7,.95));
  display:flex; align-items:flex-end; justify-content:space-between;
}
#p-flag { font-size:2.4rem; line-height:1; }
#p-hero-caption { font-size:.42rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; text-align:right; }

/* ── TITLE BLOCK ── */
#p-title-block { padding:20px 24px 16px; border-bottom:1px solid rgba(255,255,255,.05); }
#p-name { font-family:'Playfair Display',serif; font-size:2rem; font-weight:400; color:var(--bright); line-height:1.1; margin-bottom:4px; }
#p-region-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:3px 10px; font-size:.42rem; letter-spacing:.22em;
  text-transform:uppercase; border:1px solid; margin-bottom:10px;
}
/* Continent badge colors applied via JS */
#p-meta {
  display:grid; grid-template-columns:1fr 1fr;
  gap:8px; margin-top:12px;
}
.p-meta-chip {
  background:var(--glass); border:1px solid var(--glass-border);
  padding:8px 10px; display:flex; flex-direction:column; gap:2px;
}
.p-meta-chip-label { font-size:.4rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; }
.p-meta-chip-val { font-size:.7rem; color:var(--bright); font-weight:400; }
.p-meta-chip-sub { font-size:.54rem; color:var(--dim); font-weight:300; }

/* ── SECTION GENERIC ── */
.psec { padding:20px 24px; border-bottom:1px solid rgba(255,255,255,.04); }
.psec-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.psec-icon { width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:.85rem; border:1px solid var(--glass-border); color:var(--gold); flex-shrink:0; }
.psec-title { font-size:.46rem; letter-spacing:.28em; color:var(--gold-dim); text-transform:uppercase; font-weight:500; }
.psec-body { font-size:.71rem; color:var(--dim); line-height:1.9; font-weight:300; }
.psec-body strong { color:var(--bright); font-weight:500; }

/* ── VISA CARD ── */
.visa-card {
  padding:14px 16px; margin-bottom:10px;
  border:1px solid; display:flex; align-items:center; gap:12px;
}
.visa-card.free { border-color:rgba(82,183,136,.3); background:rgba(82,183,136,.04); }
.visa-card.required { border-color:rgba(224,82,82,.3); background:rgba(224,82,82,.04); }
.visa-card.partial { border-color:rgba(224,148,82,.3); background:rgba(224,148,82,.04); }
.visa-badge { font-size:.55rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase; flex-shrink:0; }
.visa-badge.free { color:var(--ok); }
.visa-badge.required { color:var(--danger); }
.visa-badge.partial { color:var(--warn); }
.visa-detail { font-size:.64rem; color:var(--dim); line-height:1.6; }

/* ── VIBE TAGS ── */
.vibe-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.vibe-tag {
  padding:4px 10px; border:1px solid var(--glass-border);
  font-size:.48rem; letter-spacing:.1em; color:var(--dim);
  text-transform:uppercase; background:var(--glass);
}

/* ── FOOD CARD ── */
.food-item { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }
.food-item:last-child { margin-bottom:0; }
.food-emoji { font-size:1.8rem; flex-shrink:0; }
.food-name { font-size:.68rem; color:var(--bright); font-weight:500; margin-bottom:3px; }
.food-desc { font-size:.62rem; color:var(--dim); line-height:1.7; }
.food-tip-callout {
  background:var(--glass); border-left:2px solid var(--gold);
  padding:10px 14px; margin-bottom:14px; font-size:.62rem;
  color:var(--dim); line-height:1.7; font-style:italic;
}

/* ── COST SECTION ── */
.cost-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0; border-bottom:1px solid rgba(255,255,255,.04);
  gap:8px;
}
.cost-row:last-child { border:none; }
.cost-lbl { font-size:.54rem; letter-spacing:.1em; color:var(--muted); flex-shrink:0; }
.cost-val { font-size:.7rem; color:var(--bright); font-weight:400; text-align:right; }
.cost-miles-val { font-size:.68rem; color:var(--gold); display:flex; align-items:center; gap:6px; justify-content:flex-end; }
.miles-tag {
  font-size:.4rem; letter-spacing:.1em;
  background:rgba(200,168,80,.1); border:1px solid rgba(200,168,80,.2);
  padding:2px 6px; text-transform:uppercase;
}

/* ── VACCINE PILLS ── */
.vax-pills { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.vax-pill {
  padding:4px 10px; font-size:.48rem; letter-spacing:.1em;
  border:1px solid rgba(224,148,82,.3); color:var(--warn);
  background:rgba(224,148,82,.05); text-transform:uppercase;
}

/* ── INFO CALLOUT ── */
.callout {
  background:var(--glass); border:1px solid var(--glass-border);
  padding:10px 14px; margin-bottom:10px;
  font-size:.62rem; color:var(--muted); line-height:1.7;
}
.callout strong { color:var(--dim); }

/* ── ETIQUETTE ITEMS ── */
.etiq-item {
  display:flex; gap:10px; align-items:flex-start;
  padding:8px 0; border-bottom:1px solid rgba(255,255,255,.04);
  font-size:.66rem; color:var(--dim); line-height:1.6;
}
.etiq-item:last-child { border:none; }
.etiq-icon { font-size:.85rem; flex-shrink:0; margin-top:1px; }

/* ═══════════════════════════════════════════════════
   LEGEND (bottom left)
═══════════════════════════════════════════════════ */
#legend {
  position:fixed; bottom:36px; left:36px; z-index:100;
  opacity:0; animation:fadeUp .5s var(--ease) 2.2s forwards;
}
.leg { display:flex; align-items:center; gap:7px; margin-bottom:7px; cursor:pointer; transition:opacity .2s; }
.leg:hover { opacity:.6; }
.leg-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.leg-txt { font-size:.4rem; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; }

/* ════════════════════════
